<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>二维码识别</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            margin: 32px auto;
            max-width: 640px;
            padding: 20px;
            color: #111;
        }
        .nav {
            margin-bottom: 24px;
            font-size: 14px;
        }
        .nav a {
            text-decoration: none;
            color: #007bff;
            margin-right: 16px;
        }
        .nav a:hover { text-decoration: underline; }

        h1 { font-size: 24px; margin-bottom: 4px; }
        .subtitle { color: #666; margin-top: 0; margin-bottom: 24px; font-size: 14px; }

        .card {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 20px;
        }

        .drop-zone {
            border: 2px dashed #ccc;
            border-radius: 8px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s, background-color 0.2s;
            position: relative;
        }
        .drop-zone:hover { border-color: #007bff; background-color: #f0f7ff; }
        .drop-zone.dragover { border-color: #007bff; background-color: #e8f4ff; }
        .drop-zone-icon { font-size: 40px; margin-bottom: 8px; color: #999; }
        .drop-zone-text { font-size: 15px; color: #555; }
        .drop-zone-hint { font-size: 13px; color: #999; margin-top: 6px; }
        .drop-zone input[type="file"] {
            position: absolute; inset: 0; opacity: 0; cursor: pointer;
        }

        .preview-area {
            display: none;
            margin-top: 16px;
            text-align: center;
        }
        .preview-area img {
            max-width: 100%;
            max-height: 320px;
            border-radius: 6px;
            box-shadow: 0 1px 6px rgba(0,0,0,0.12);
        }
        .preview-area canvas { display: none; }

        .result-box {
            display: none;
            margin-top: 16px;
            padding: 16px;
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            border-radius: 8px;
        }
        .result-box.fail {
            background: #fef2f2;
            border-color: #fecaca;
        }
        .result-label {
            font-size: 13px;
            font-weight: 600;
            color: #166534;
            margin-bottom: 6px;
        }
        .result-box.fail .result-label { color: #991b1b; }
        .result-url {
            word-break: break-all;
            background: #fff;
            padding: 10px 12px;
            border-radius: 6px;
            font-size: 14px;
            border: 1px solid #e5e7eb;
            margin-bottom: 10px;
        }
        .btn-row { display: flex; gap: 8px; }
        .btn {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 8px 18px;
            border: none; border-radius: 6px;
            font-size: 14px; cursor: pointer;
        }
        .btn-primary { background: #007bff; color: #fff; }
        .btn-primary:hover { background: #0056b3; }
        .btn-success { background: #16a34a; color: #fff; }
        .btn-success:hover { background: #15803d; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .status-bar {
            font-size: 13px;
            color: #666;
            margin-top: 12px;
            min-height: 20px;
        }

        .clear-btn {
            background: none; border: none;
            color: #999; cursor: pointer; font-size: 12px;
            padding: 4px 8px; margin-top: 8px;
        }
        .clear-btn:hover { color: #333; }

        .footer-links {
            margin-top: 32px;
            border-top: 1px solid #eee;
            padding-top: 16px;
            font-size: 13px;
            color: #888;
            text-align: center;
        }
        .footer-links a { color: #007bff; text-decoration: none; margin: 0 8px; }
        .footer-links a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="nav">
        <a href="index.html">代理转换</a>
        <a href="url_to_qrcode.html">二维码生成器</a>
        <a href="singbox_ss_uri.html">Sing-box JSON转URI</a>
        <a href="singbox_full_config.html">Sing-box 完整配置</a>
    </div>

    <h1>二维码识别</h1>
    <p class="subtitle">上传或粘贴包含二维码的图片，自动识别出其中的链接</p>

    <div class="card">
        <div class="drop-zone" id="dropZone">
            <input type="file" id="fileInput" accept="image/*">
            <div class="drop-zone-icon">📷</div>
            <div class="drop-zone-text">点击选择图片，或将图片拖放到此处</div>
            <div class="drop-zone-hint">也可以直接 <kbd>Ctrl+V</kbd> / <kbd>⌘V</kbd> 粘贴剪贴板中的图片</div>
        </div>

        <div class="preview-area" id="previewArea">
            <img id="previewImg" alt="预览">
            <canvas id="qrCanvas"></canvas>
        </div>

        <div class="result-box" id="resultBox">
            <div class="result-label" id="resultLabel">✅ 识别成功</div>
            <div class="result-url" id="resultUrl"></div>
            <div class="btn-row">
                <button class="btn btn-success" id="copyBtn" onclick="copyUrl()">
                    📋 复制链接
                </button>
            </div>
        </div>

        <div class="status-bar" id="statusBar"></div>

        <button class="clear-btn" id="clearBtn" onclick="resetAll()" style="display:none;">清除重新识别</button>
    </div>

    <div class="footer-links">
        <a href="https://github.com/wynemo/v2ray-to-sing-box" target="_blank">GitHub</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const previewArea = document.getElementById('previewArea');
        const previewImg = document.getElementById('previewImg');
        const qrCanvas = document.getElementById('qrCanvas');
        const resultBox = document.getElementById('resultBox');
        const resultLabel = document.getElementById('resultLabel');
        const resultUrl = document.getElementById('resultUrl');
        const copyBtn = document.getElementById('copyBtn');
        const statusBar = document.getElementById('statusBar');
        const clearBtn = document.getElementById('clearBtn');

        let lastDecodedUrl = '';

        // ── File input ──
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) processFile(file);
        });

        // ── Drag & drop ──
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });
        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file) processFile(file);
        });

        // ── Clipboard paste ──
        document.addEventListener('paste', (e) => {
            const items = e.clipboardData.items;
            for (const item of items) {
                if (item.type.startsWith('image/')) {
                    e.preventDefault();
                    const file = item.getAsFile();
                    if (file) processFile(file);
                    break;
                }
            }
        });

        // ── Process file ──
        function processFile(file) {
            if (!file.type.startsWith('image/')) {
                setStatus('请选择图片文件', true);
                return;
            }

            setStatus('正在加载图片…');
            const reader = new FileReader();
            reader.onload = (e) => {
                previewImg.onload = () => decodeQR();
                previewImg.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        // ── Decode QR ──
        function decodeQR() {
            setStatus('正在识别二维码…');

            previewArea.style.display = 'block';
            resultBox.style.display = 'none';
            clearBtn.style.display = 'none';

            const img = previewImg;
            const canvas = qrCanvas;
            const ctx = canvas.getContext('2d');

            // Use natural dimensions for best resolution
            const w = img.naturalWidth;
            const h = img.naturalHeight;
            if (w === 0 || h === 0) {
                setStatus('图片加载异常，请重试', true);
                return;
            }

            canvas.width = w;
            canvas.height = h;
            ctx.drawImage(img, 0, 0, w, h);

            const imageData = ctx.getImageData(0, 0, w, h);

            let code = null;
            try {
                code = jsQR(imageData.data, w, h, { inversionAttempts: 'dontInvert' });
            } catch (err) {
                // fallback
            }

            if (!code) {
                // Try again with inverted attempt
                try {
                    code = jsQR(imageData.data, w, h, { inversionAttempts: 'attemptBoth' });
                } catch (err) {
                    // ignore
                }
            }

            if (code && code.data) {
                lastDecodedUrl = code.data;
                resultUrl.textContent = code.data;
                resultLabel.textContent = '✅ 识别成功';
                resultBox.className = 'result-box';
                resultBox.style.display = 'block';
                copyBtn.disabled = false;
                setStatus('🎉 二维码识别成功！');
            } else {
                lastDecodedUrl = '';
                resultUrl.textContent = '';
                resultLabel.textContent = '❌ 未识别到二维码';
                resultBox.className = 'result-box fail';
                resultBox.style.display = 'block';
                copyBtn.disabled = true;
                setStatus('未能在图片中找到有效的二维码，请换一张图片试试', true);
            }

            clearBtn.style.display = 'inline-block';
        }

        // ── Copy URL ──
        function copyUrl() {
            if (!lastDecodedUrl) return;
            navigator.clipboard.writeText(lastDecodedUrl).then(() => {
                setStatus('✅ 已复制到剪贴板');
                copyBtn.textContent = '✅ 已复制';
                setTimeout(() => {
                    copyBtn.innerHTML = '📋 复制链接';
                }, 2000);
            }).catch(() => {
                // fallback
                const ta = document.createElement('textarea');
                ta.value = lastDecodedUrl;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                setStatus('✅ 已复制到剪贴板');
            });
        }

        // ── Reset ──
        function resetAll() {
            previewArea.style.display = 'none';
            resultBox.style.display = 'none';
            clearBtn.style.display = 'none';
            statusBar.textContent = '';
            fileInput.value = '';
            lastDecodedUrl = '';
            previewImg.src = '';
            copyBtn.innerHTML = '📋 复制链接';
            copyBtn.disabled = true;
        }

        function setStatus(msg, isError) {
            statusBar.textContent = msg;
            statusBar.style.color = isError ? '#dc2626' : '#666';
        }
    </script>
</body>
</html>
